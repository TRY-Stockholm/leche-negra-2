<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" fill="none">
  <!-- Flame -->
  <ellipse cx="100" cy="60" rx="22" ry="40" fill="#F5A623" opacity="0.9"/>
  <ellipse cx="100" cy="55" rx="12" ry="28" fill="#FFEAA7" opacity="0.8"/>
  <ellipse cx="100" cy="48" rx="5" ry="14" fill="#FFF" opacity="0.6"/>
  <!-- Wick -->
  <line x1="100" y1="90" x2="100" y2="110" stroke="#333" stroke-width="2"/>
  <!-- Candle body -->
  <rect x="72" y="110" width="56" height="240" rx="4" fill="#F5F0E8"/>
  <!-- Wax drips -->
  <ellipse cx="72" cy="160" rx="4" ry="12" fill="#F5F0E8"/>
  <ellipse cx="128" cy="180" rx="3" ry="10" fill="#F5F0E8"/>
  <!-- Base -->
  <ellipse cx="100" cy="350" rx="40" ry="8" fill="#C9A96E"/>
  <rect x="60" y="342" width="80" height="30" rx="4" fill="#C9A96E"/>
</svg>
